language: php
cwe_id: "CWE-79"
cwe_name: "Cross-site Scripting (XSS)"

patterns:
  - id: xss_php_echo_get
    name: PHP echo with $_GET
    regex: '\becho\s+\$_GET\s*\['
    vulnerability_type: xss
    severity_score: 3

  - id: xss_php_echo_post
    name: PHP echo with $_POST
    regex: '\becho\s+\$_POST\s*\['
    vulnerability_type: xss
    severity_score: 3

  - id: xss_php_echo_request
    name: PHP echo with $_REQUEST
    regex: '\becho\s+\$_REQUEST\s*\['
    vulnerability_type: xss
    severity_score: 3

  - id: xss_php_echo_cookie
    name: PHP echo with $_COOKIE
    regex: '\becho\s+\$_COOKIE\s*\['
    vulnerability_type: xss
    severity_score: 3

  - id: xss_php_print_superglobal
    name: PHP print with superglobal
    regex: '\bprint\s+\$_(GET|POST|REQUEST|COOKIE)\s*\['
    vulnerability_type: xss
    severity_score: 3

  - id: xss_php_printf_superglobal
    name: PHP printf/sprintf with superglobal
    regex: '\bprintf\s*\(.*\$_(GET|POST|REQUEST)'
    vulnerability_type: xss
    severity_score: 3

  - id: xss_php_short_echo_superglobal
    name: PHP short echo tag with superglobal
    regex: '<\?=\s*\$_(GET|POST|REQUEST|COOKIE|SERVER)'
    vulnerability_type: xss
    severity_score: 3

  - id: xss_php_echo_concat_superglobal
    name: PHP echo with string concatenation of superglobal
    regex: '\becho\b[^;]*\.\s*\$_(GET|POST|REQUEST|COOKIE)'
    vulnerability_type: xss
    severity_score: 3

  - id: xss_php_echo_server_reflected
    name: PHP echo with $_SERVER user-controlled keys (PHP_SELF, REQUEST_URI, etc.)
    regex: '\becho\b.*\$_SERVER\s*\[\s*[''"](?:HTTP_REFERER|HTTP_USER_AGENT|QUERY_STRING|REQUEST_URI|PHP_SELF)[''"]'
    vulnerability_type: xss
    severity_score: 3

  - id: xss_php_extract_superglobal
    name: PHP extract() with superglobal — arbitrary variable injection
    regex: '\bextract\s*\(\s*\$_(GET|POST|REQUEST)'
    vulnerability_type: xss
    severity_score: 8

  - id: xss_php_print_r_superglobal
    name: PHP print_r/var_dump with superglobal — debug output in production
    regex: '\b(?:print_r|var_dump|var_export)\s*\(\s*\$_(GET|POST|REQUEST|COOKIE)'
    vulnerability_type: xss
    severity_score: 2
