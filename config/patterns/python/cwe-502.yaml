language: python
cwe_id: "CWE-502"
cwe_name: "Deserialization of Untrusted Data"

patterns:
  - id: deser_python_pickle_loads
    name: Python pickle.loads()
    regex: 'pickle\.(loads|load)\s*\('
    vulnerability_type: deserialization
    severity_score: 9

  - id: deser_python_pickle_unpickler
    name: Python pickle.Unpickler
    regex: 'pickle\.Unpickler\s*\('
    vulnerability_type: deserialization
    severity_score: 9

  - id: deser_python_yaml_load_unsafe
    name: Python yaml.load() without safe Loader
    regex: 'yaml\.load\s*\((?![^)]*Loader\s*=)'
    vulnerability_type: deserialization
    severity_score: 7

  - id: deser_python_marshal_loads
    name: Python marshal.loads()
    regex: 'marshal\.loads\s*\('
    vulnerability_type: deserialization
    severity_score: 8

  - id: deser_python_shelve_open
    name: Python shelve.open() with variable path
    regex: 'shelve\.open\s*\(\s*(request|req|input|param|path)'
    vulnerability_type: deserialization
    severity_score: 7
